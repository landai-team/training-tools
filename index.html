<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mock Call Scenario Roulette</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #0A1628; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
.header { text-align: center; margin-bottom: 28px; }
.header .brand { font-size: 13px; font-weight: 700; letter-spacing: 3px; color: #F5A623; text-transform: uppercase; margin-bottom: 6px; }
.header h1 { font-size: 26px; font-weight: 800; color: #FFFFFF; margin-bottom: 6px; }
.header p { font-size: 14px; color: #8899AA; }
#nameGate { background: #111E30; border: 2px solid #1D2E45; border-radius: 16px; padding: 28px; max-width: 380px; width: 100%; text-align: center; }
#nameGate label { display: block; font-size: 14px; font-weight: 700; color: #8899AA; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; }
#nameInput { width: 100%; padding: 12px 16px; border-radius: 8px; border: 2px solid #1D2E45; background: #0A1628; color: #FFFFFF; font-size: 16px; outline: none; margin-bottom: 14px; }
#nameInput:focus { border-color: #F5A623; }
#nameInput::placeholder { color: #506070; }
#startBtn { background: #F5A623; color: #0A1628; border: none; border-radius: 50px; padding: 13px 40px; font-size: 15px; font-weight: 800; cursor: pointer; text-transform: uppercase; width: 100%; }
#wheelSection { display: none; flex-direction: column; align-items: center; }
.trainee-tag { background: #1D2E45; color: #F5A623; font-size: 13px; font-weight: 700; padding: 6px 18px; border-radius: 20px; margin-bottom: 20px; }
.wheel-container { position: relative; display: flex; align-items: center; justify-content: center; margin-bottom: 28px; }
.pointer { position: absolute; top: -18px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 14px solid transparent; border-right: 14px solid transparent; border-top: 26px solid #F5A623; z-index: 10; }
canvas { border-radius: 50%; box-shadow: 0 0 0 6px #1D2E45, 0 0 0 10px #F5A623, 0 8px 40px rgba(0,0,0,0.6); display: block; }
#spinBtn { background: #F5A623; color: #0A1628; border: none; border-radius: 50px; padding: 16px 52px; font-size: 17px; font-weight: 800; cursor: pointer; text-transform: uppercase; box-shadow: 0 4px 20px rgba(245,166,35,0.4); }
#spinBtn:disabled { background: #2D3F55; color: #506070; cursor: not-allowed; box-shadow: none; }
#result { display: none; margin-top: 28px; background: #111E30; border: 2px solid #1D2E45; border-radius: 16px; padding: 24px 28px; max-width: 420px; width: 100%; text-align: center; }
#result .scenario-badge { display: inline-block; font-size: 42px; font-weight: 900; width: 72px; height: 72px; line-height: 72px; border-radius: 50%; margin-bottom: 12px; }
#result .seller-name { font-size: 20px; font-weight: 700; color: #FFFFFF; margin-bottom: 4px; }
#result .difficulty { font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; padding: 3px 12px; border-radius: 20px; display: inline-block; margin-bottom: 14px; }
#result .focus-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; color: #506070; text-transform: uppercase; margin-bottom: 6px; }
#result .focus-text { font-size: 14px; color: #C8D8E8; line-height: 1.5; }
#lockedMsg { display: none; margin-top: 16px; background: #1A0D00; border: 1px solid #7B3F00; border-radius: 10px; padding: 12px 20px; max-width: 420px; width: 100%; text-align: center; color: #F5A623; font-size: 13px; font-weight: 600; }
</style>
</head>
<body>
<div class="header">
<div class="brand">Land AI Training Tool</div>
<h1>Mock Call Scenario</h1>
<p>Enter your name, then spin - one spin per trainee, no retakes!</p>
</div>
<div id="nameGate">
<label for="nameInput">Your Full Name</label>
<input type="text" id="nameInput" placeholder="e.g. John Santos" autocomplete="off" />
<button id="startBtn" onclick="startForTrainee()">Lets Go</button>
</div>
<div id="wheelSection">
<div class="trainee-tag" id="traineeTag"></div>
<div class="wheel-container">
<div class="pointer"></div>
<canvas id="wheel" width="300" height="300"></canvas>
</div>
<button id="spinBtn" onclick="spin()">Spin</button>
<div id="result">
<div class="scenario-badge" id="resBadge"></div>
<div class="seller-name" id="resName"></div>
<div class="difficulty" id="resDifficulty"></div>
<div class="focus-label">Your Focus</div>
<div class="focus-text" id="resFocus"></div>
</div>
<div id="lockedMsg">Locked! <span id="lockedName"></span> - your scenario is set, no retakes.</div>
</div>
<script>
const P='landai_spin_';
const S=[{letter:'A',seller:'Bobby Mitchell',property:'5-acre lot Maricopa County AZ',difficulty:'EASY',diffColor:'#F5A623',diffText:'#0A1628',focus:'Full script delivery and clean Maya handoff. No major objections.',segColor:'#0A1628',textColor:'#F5A623'},{letter:'B',seller:'Pat Williams',property:'2-acre plot Polk County FL',difficulty:'MEDIUM',diffColor:'#2D6A4F',diffText:'#FFFFFF',focus:'Use all 3 Not Interested rebuttals in order before accepting NI.',segColor:'#F5A623',textColor:'#0A1628'},{letter:'C',seller:'Jim Calloway',property:'10-acre parcel Hood County TX',difficulty:'HARD',diffColor:'#D92D20',diffText:'#FFFFFF',focus:'Handle price objection with rebuttals. Acknowledge, explain process, route to Maya.',segColor:'#1D4ED8',textColor:'#FFFFFF'}];
const cv=document.getElementById('wheel'),cx=cv.getContext('2d'),N=S.length,A=(2*Math.PI)/N,CX=cv.width/2,CY=cv.height/2,R=cv.width/2-4;
let ang=0,spinning=false,spun=false,tname='';
function draw(a){cx.clearRect(0,0,cv.width,cv.height);for(let i=0;i<N;i++){const s=a+i*A,e=s+A,sc=S[i];cx.beginPath();cx.moveTo(CX,CY);cx.arc(CX,CY,R,s,e);cx.closePath();cx.fillStyle=sc.segColor;cx.fill();cx.strokeStyle='#0A1628';cx.lineWidth=3;cx.stroke();cx.save();cx.translate(CX,CY);cx.rotate(s+A/2);cx.textAlign='right';cx.fillStyle=sc.textColor;cx.font='bold 52px Arial';cx.fillText(sc.letter,R-22,18);cx.restore();}cx.beginPath();cx.arc(CX,CY,22,0,2*Math.PI);cx.fillStyle='#F5A623';cx.fill();cx.strokeStyle='#0A1628';cx.lineWidth=3;cx.stroke();}
function show(i,an){const sc=S[i],b=document.getElementById('resBadge');b.textContent=sc.letter;b.style.background=sc.segColor==='#F5A623'?'#F5A623':sc.segColor;b.style.color=sc.textColor;b.style.border='3px solid '+(sc.segColor==='#0A1628'?'#F5A623':'#0A1628');document.getElementById('resName').textContent=sc.seller+' '+sc.property;const d=document.getElementById('resDifficulty');d.textContent=sc.difficulty;d.style.background=sc.diffColor;d.style.color=sc.diffText;document.getElementById('resFocus').textContent=sc.focus;document.getElementById('result').style.display='block';if(!an)document.getElementById('result').style.animation='none';}
function win(a){return Math.floor((((-a-Math.PI/2)%(2*Math.PI))+2*Math.PI)%(2*Math.PI)/A)%N;}
function ease(t){return 1-Math.pow(1-t,4);}
function spin(){if(spinning||spun)return;spinning=true;document.getElementById('spinBtn').disabled=true;const ex=(5+Math.floor(Math.random()*4))*2*Math.PI,ts=Math.floor(Math.random()*N),to=-(ts*A+A/2+Math.PI/2),tr=ex+((to-ang%(2*Math.PI)+4*Math.PI)%(2*Math.PI)),sa=ang,dur=4000+Math.random()*1000,st=performance.now();function f(now){const t=Math.min((now-st)/dur,1);ang=sa+tr*ease(t);draw(ang);if(t<1){requestAnimationFrame(f);}else{ang=sa+tr;draw(ang);spinning=false;spun=true;const w=win(ang);localStorage.setItem(P+tname.toLowerCase().trim(),JSON.stringify({winner:w,angle:ang}));show(w,true);document.getElementById('lockedMsg').style.display='block';document.getElementById('lockedName').textContent=tname;}}requestAnimationFrame(f);}
function startForTrainee(){const v=document.getElementById('nameInput').value.trim();if(!v){document.getElementById('nameInput').focus();return;}tname=v;document.getElementById('nameGate').style.display='none';document.getElementById('wheelSection').style.display='flex';document.getElementById('traineeTag').textContent='Trainee: '+v;const sv=localStorage.getItem(P+v.toLowerCase().trim());if(sv){try{const{winner:w,angle:a}=JSON.parse(sv);spun=true;ang=a||0;draw(ang);document.getElementById('spinBtn').disabled=true;show(w,false);document.getElementById('lockedMsg').style.display='block';document.getElementById('lockedName').textContent=tname;}catch(e){draw(0);}}else{draw(0);}}
document.getElementById('nameInput').addEventListener('keydown',function(e){if(e.key==='Enter')startForTrainee();});
</script>
</body>
</html>
