<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mock Call Scenario Roulette</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #0A1628; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
  .header { text-align: center; margin-bottom: 28px; }
  .header .brand { font-size: 13px; font-weight: 700; letter-spacing: 3px; color: #F5A623; text-transform: uppercase; margin-bottom: 6px; }
  .header h1 { font-size: 26px; font-weight: 800; color: #FFFFFF; margin-bottom: 6px; }
  .header p { font-size: 14px; color: #8899AA; }
  .wheel-container { position: relative; display: flex; align-items: center; justify-content: center; margin-bottom: 28px; }
  .pointer { position: absolute; top: -18px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 14px solid transparent; border-right: 14px solid transparent; border-top: 26px solid #F5A623; z-index: 10; }
  canvas { border-radius: 50%; box-shadow: 0 0 0 6px #1D2E45, 0 0 0 10px #F5A623, 0 8px 40px rgba(0,0,0,0.6); display: block; }
  #spinBtn { background: #F5A623; color: #0A1628; border: none; border-radius: 50px; padding: 16px 52px; font-size: 17px; font-weight: 800; cursor: pointer; text-transform: uppercase; box-shadow: 0 4px 20px rgba(245,166,35,0.4); }
  #spinBtn:disabled { background: #2D3F55; color: #506070; cursor: not-allowed; box-shadow: none; }
  #result { display: none; margin-top: 28px; background: #111E30; border: 2px solid #1D2E45; border-radius: 16px; padding: 24px 28px; max-width: 420px; width: 100%; text-align: center; }
  #result .scenario-badge { display: inline-block; font-size: 42px; font-weight: 900; width: 72px; height: 72px; line-height: 72px; border-radius: 50%; margin-bottom: 12px; }
  #result .seller-name { font-size: 20px; font-weight: 700; color: #FFFFFF; margin-bottom: 4px; }
  #result .difficulty { font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; padding: 3px 12px; border-radius: 20px; display: inline-block; margin-bottom: 14px; }
  #result .focus-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; color: #506070; text-transform: uppercase; margin-bottom: 6px; }
  #result .focus-text { font-size: 14px; color: #C8D8E8; line-height: 1.5; }
  #lockedMsg { display: none; margin-top: 16px; background: #1A0D00; border: 1px solid #7B3F00; border-radius: 10px; padding: 12px 20px; max-width: 420px; width: 100%; text-align: center; color: #F5A623; font-size: 13px; font-weight: 600; }
</style>
</head>
<body>
<div class="header">
  <div class="brand">Land AI · Training Tool</div>
  <h1>🎡 Mock Call Scenario</h1>
  <p>Spin to get your scenario — <strong style="color:#F5A623">one spin only</strong>, no retakes!</p>
</div>
<div class="wheel-container">
  <div class="pointer"></div>
  <canvas id="wheel" width="300" height="300"></canvas>
</div>
<button id="spinBtn">🎲 Spin</button>
<div id="result">
  <div class="scenario-badge" id="resBadge"></div>
  <div class="seller-name" id="resName"></div>
  <div class="difficulty" id="resDifficulty"></div>
  <div class="focus-label">Your Focus</div>
  <div class="focus-text" id="resFocus"></div>
</div>
<div id="lockedMsg"><span>🔒</span> You already spun! Your scenario is locked in — no retakes allowed.</div>
<script>
const STORAGE_KEY='landai_mock_scenario';
const scenarios=[
  {letter:'A',seller:'Bobby Mitchell',property:'5-acre lot — Maricopa County, AZ',difficulty:'EASY',diffColor:'#F5A623',diffText:'#0A1628',focus:'Full script delivery + clean Maya handoff. No objections — focus on flow and confidence.',segColor:'#0A1628',textColor:'#F5A623'},
  {letter:'B',seller:'Pat Williams',property:'2-acre plot — Polk County, FL',difficulty:'MEDIUM',diffColor:'#2D6A4F',diffText:'#FFFFFF',focus:'Use all 3 Not Interested rebuttals in order before accepting NI.',segColor:'#F5A623',textColor:'#0A1628'},
  {letter:'C',seller:'Jim Calloway',property:'10-acre parcel — Hood County, TX',difficulty:'HARD',diffColor:'#D92D20',diffText:'#FFFFFF',focus:'Handle How much can you offer? with price rebuttals — acknowledge, explain process, route to Maya.',segColor:'#1D4ED8',textColor:'#FFFFFF'}
];
const canvas=document.getElementById('wheel'),ctx=canvas.getContext('2d'),spinBtn=document.getElementById('spinBtn'),resultDiv=document.getElementById('result'),lockedMsg=document.getElementById('lockedMsg');
const NUM=scenarios.length,ARC=(2*Math.PI)/NUM,CX=canvas.width/2,CY=canvas.height/2,R=canvas.width/2-4;
let currentAngle=0,isSpinning=false,hasSpun=false;
function drawWheel(a){ctx.clearRect(0,0,canvas.width,canvas.height);for(let i=0;i<NUM;i++){const s=a+i*ARC,e=s+ARC,sc=scenarios[i];ctx.beginPath();ctx.moveTo(CX,CY);ctx.arc(CX,CY,R,s,e);ctx.closePath();ctx.fillStyle=sc.segColor;ctx.fill();ctx.strokeStyle='#0A1628';ctx.lineWidth=3;ctx.stroke();ctx.save();ctx.translate(CX,CY);ctx.rotate(s+ARC/2);ctx.textAlign='right';ctx.fillStyle=sc.textColor;ctx.font='bold 52px Arial';ctx.fillText(sc.letter,R-22,18);ctx.restore();}ctx.beginPath();ctx.arc(CX,CY,22,0,2*Math.PI);ctx.fillStyle='#F5A623';ctx.fill();ctx.strokeStyle='#0A1628';ctx.lineWidth=3;ctx.stroke();}
function showResult(idx,anim){const sc=scenarios[idx],b=document.getElementById('resBadge');b.textContent=sc.letter;b.style.background=sc.segColor==='#F5A623'?'#F5A623':sc.segColor;b.style.color=sc.textColor;b.style.border='3px solid '+(sc.segColor==='#0A1628'?'#F5A623':'#0A1628');document.getElementById('resName').textContent=sc.seller+' · '+sc.property;const d=document.getElementById('resDifficulty');d.textContent=sc.difficulty;d.style.background=sc.diffColor;d.style.color=sc.diffText;document.getElementById('resFocus').textContent=sc.focus;resultDiv.style.display='block';if(!anim)resultDiv.style.animation='none';}
function getWinner(a){return Math.floor((((-a-Math.PI/2)%(2*Math.PI))+2*Math.PI)%(2*Math.PI)/ARC)%NUM;}
function easeOut(t){return 1-Math.pow(1-t,4);}
function spin(){if(isSpinning||hasSpun)return;isSpinning=true;spinBtn.disabled=true;const ex=(5+Math.floor(Math.random()*4))*2*Math.PI,ts=Math.floor(Math.random()*NUM),to=-(ts*ARC+ARC/2+Math.PI/2),tr=ex+((to-currentAngle%(2*Math.PI)+4*Math.PI)%(2*Math.PI)),sa=currentAngle,dur=4000+Math.random()*1000,st=performance.now();function af(now){const t=Math.min((now-st)/dur,1);currentAngle=sa+tr*easeOut(t);drawWheel(currentAngle);if(t<1){requestAnimationFrame(af);}else{currentAngle=sa+tr;drawWheel(currentAngle);isSpinning=false;hasSpun=true;const w=getWinner(currentAngle);localStorage.setItem(STORAGE_KEY,JSON.stringify({winner:w,angle:currentAngle}));showResult(w,true);lockedMsg.style.display='block';}}requestAnimationFrame(af);}
function init(){const saved=localStorage.getItem(STORAGE_KEY);if(saved){try{const{winner,angle}=JSON.parse(saved);hasSpun=true;currentAngle=angle||0;drawWheel(currentAngle);spinBtn.disabled=true;showResult(winner,false);lockedMsg.style.display='block';}catch(e){drawWheel(0);}}else{drawWheel(0);}}
spinBtn.addEventListener('click',spin);init();
</script>
</body>
</html>
